<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Piratica</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body {
      overflow: hidden;
    }
    @media (max-width: 400px) {
      body { overflow: auto; }
      .auth-page { padding: 16px; align-items: flex-start; min-height: auto; }
      .auth-card { padding: 24px; margin-top: 24px; }
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="logo" style="justify-content: center; margin-bottom: 24px;">Piratica <i class="ph ph-anchor"></i></div>
      <h2 style="font-family: var(--font-display); color: var(--primary); margin-bottom: 32px;">Welcome Back</h2>
      
      <form novalidate>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" required placeholder="you@example.com">
          <div class="form-error">Please enter a valid email</div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required placeholder="••••••••">
          <div class="form-error">Password must be at least 8 characters</div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 0.9rem; font-family: var(--font-ui);">
          <label class="checkbox-wrap" style="margin-bottom: 0;">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" style="color: var(--primary); font-weight: 700;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>

      <div class="auth-divider"><span>OR</span></div>

      <button class="social-btn" style="border-color: #d32f2f; color: #d32f2f;">
        <i class="ph-fill ph-google-logo" style="font-size: 1.2rem;"></i> Continue with Google
      </button>
      <button class="social-btn">
        <i class="ph ph-envelope-simple" style="font-size: 1.2rem;"></i> Continue with Email
      </button>

      <div class="auth-links">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
